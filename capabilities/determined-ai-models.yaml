naftiko: 1.0.0-alpha2
info:
  label: Determined AI REST API — Models
  description: 'Determined AI REST API — Models. 1 operations. Lead operation: List models. Self-contained Naftiko capability
    covering one Determined Ai business surface.'
  tags:
  - Determined Ai
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DETERMINED_AI_API_KEY: DETERMINED_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: determined-ai-models
    baseUri: https://master.example.com
    description: Determined AI REST API — Models business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-models
      path: /api/v1/models
      operations:
      - name: getmodels
        method: GET
        description: List models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DETERMINED_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: determined-ai-models-rest
    port: 8080
    description: REST adapter for Determined AI REST API — Models. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/models
      name: api-v1-models
      description: REST surface for api-v1-models.
      operations:
      - method: GET
        name: getmodels
        description: List models
        call: determined-ai-models.getmodels
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: determined-ai-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Determined AI REST API — Models. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-models
      description: List models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: determined-ai-models.getmodels
      outputParameters:
      - type: object
        mapping: $.
