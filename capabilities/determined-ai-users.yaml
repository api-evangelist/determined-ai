naftiko: 1.0.0-alpha2
info:
  label: Determined AI REST API — Users
  description: 'Determined AI REST API — Users. 1 operations. Lead operation: List users. Self-contained Naftiko capability
    covering one Determined Ai business surface.'
  tags:
  - Determined Ai
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DETERMINED_AI_API_KEY: DETERMINED_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: determined-ai-users
    baseUri: https://master.example.com
    description: Determined AI REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-users
      path: /api/v1/users
      operations:
      - name: getusers
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DETERMINED_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: determined-ai-users-rest
    port: 8080
    description: REST adapter for Determined AI REST API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/users
      name: api-v1-users
      description: REST surface for api-v1-users.
      operations:
      - method: GET
        name: getusers
        description: List users
        call: determined-ai-users.getusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: determined-ai-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Determined AI REST API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: determined-ai-users.getusers
      outputParameters:
      - type: object
        mapping: $.
