aid: determined-ai
name: Determined AI
description: >-
  Determined helps deep learning teams train models more quickly, easily share
  GPU resources, and effectively collaborate. Determined allows deep learning
  engineers to focus on building and training models at scale, without needing
  to worry about DevOps or writing custom code for common tasks like fault
  tolerance or experiment tracking. It bridges the gap between tools like
  TensorFlow and PyTorch for single researchers to the challenges that arise
  when doing deep learning at scale.
